<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>护你宠家 - 宠物运输平台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:"微软雅黑",sans-serif;
    background:#fff5fc;
    min-height:100vh;
    padding:20px;
  }
  .page{
    display:none;
    max-width:400px;
    margin:0 auto;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 8px 25px rgba(255,183,222,0.3);
  }
  .page.active{display:block;}

  .title{
    text-align:center;
    color:#ff6ba1;
    font-size:24px;
    margin-bottom:20px;
  }

  .form-item{margin-bottom:15px;}
  .form-item label{
    font-size:14px;
    color:#666;
    margin-bottom:5px;
    display:block;
  }
  .form-item input,
  .form-item select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ffd6ec;
    outline:none;
    font-size:15px;
  }

  .btn{
    width:100%;
    padding:13px;
    border-radius:12px;
    border:none;
    background:#ff6ba1;
    color:white;
    font-size:16px;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
  }
  .btn:hover{background:#ff4a8c;}

  .link{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    color:#999;
  }
  .link span{
    color:#ff6ba1;
    cursor:pointer;
  }

  .card{
    background:#fff0f7;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
  }
  .card h2{
    color:#ff5a9d;
    margin-bottom:10px;
    font-size:18px;
  }
  .card p{color:#888;margin-bottom:10px;}

  .status{
    padding:10px;
    border-radius:10px;
    margin:8px 0;
    font-size:14px;
  }
  .status-normal{
    background:#e8ffe8;
    color:#2e7d32;
  }
  .status-trans{
    background:#fff4e8;
    color:#ff8a3d;
  }
</style>
</head>

<body>

<!-- ========== 1. 登录页 ========== -->
<div class="page active" id="loginPage">
  <h1 class="title">🐾 护你宠家</h1>

  <div class="form-item">
    <label>手机号</label>
    <input type="text" placeholder="请输入手机号" id="loginPhone">
  </div>

  <div class="form-item">
    <label>密码</label>
    <input type="password" placeholder="请输入密码" id="loginPwd">
  </div>

  <button class="btn" onclick="checkLogin()">登录</button>

  <div class="link">
    没有账号？<span onclick="showPage('registerPage')">立即注册</span>
  </div>
</div>

<!-- ========== 2. 注册页 ========== -->
<div class="page" id="registerPage">
  <h1 class="title">🐾 注册账号</h1>

  <div class="form-item">
    <label>手机号</label>
    <input type="text" placeholder="请输入手机号" id="regPhone">
  </div>

  <div class="form-item">
    <label>设置密码</label>
    <input type="password" placeholder="至少6位" id="regPwd">
  </div>

  <div class="form-item">
    <label>宠物昵称</label>
    <input type="text" placeholder="如：小咪、旺财" id="petName">
  </div>

  <button class="btn" onclick="doRegister()">注册</button>

  <div class="link">
    已有账号？<span onclick="showPage('loginPage')">去登录</span>
  </div>
</div>

<!-- ========== 3. 首页 ========== -->
<div class="page" id="homePage">
  <h1 class="title">🐾 护你宠家</h1>

  <div class="card">
    <h2>欢迎回来，<span id="userNickname">小咪主人</span></h2>
    <p>全程监控 · 实时定位 · 安心送达</p >
    <button class="btn" onclick="showPage('orderPage')">立即预约宠物运输</button>
  </div>

  <div class="card">
    <h2>当前运输监控</h2>
    <div id="orderStatus">
      暂无订单
    </div>
  </div>
</div>

<!-- ========== 4. 预约页 ========== -->
<div class="page" id="orderPage">
  <h1 class="title">🐾 宠物运输预约</h1>

  <div class="form-item">
    <label>宠物类别</label>
    <select id="petType">
      <option>🐱 猫咪</option>
      <option>🐶 狗狗</option>
      <option>🐰 兔子</option>
      <option>🐹 仓鼠</option>
      <option>🦜 鸟类</option>
      <option>🐢 爬宠</option>
      <option>其他</option>
    </select>
  </div>

  <div class="form-item">
    <label>接宠地址</label>
    <input type="text" placeholder="详细地址" id="pickAddr">
  </div>

  <div class="form-item">
    <label>开始运输时间</label>
    <input type="datetime-local" id="transportTime">
  </div>

  <div class="form-item">
    <label>运输终点</label>
    <input type="text" placeholder="终点地址" id="endAddr">
  </div>

  <button class="btn" onclick="submitOrder()">提交预约</button>
  <button class="btn" style="background:#ffb6d9;color:#ff4a8c;" onclick="showPage('homePage')">返回</button>
</div>

<!-- ========== 5. 监控页 ========== -->
<div class="page" id="monitorPage">
  <h1 class="title">🐾 运输实时监控</h1>

  <div class="status status-normal" id="monHealth">
    健康状态：正常 ✅
  </div>

  <div class="status status-trans" id="monTrans">
    运输状态：等待出发 🚚
  </div>

  <div class="card">
    <h2>订单信息</h2>
    <p id="monInfo">暂无订单信息</p >
  </div>

  <button class="btn" onclick="showPage('homePage')">返回首页</button>
</div>

<script>
// 页面切换
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// 注册逻辑
function doRegister(){
  let phone = document.getElementById('regPhone').value;
  let pwd = document.getElementById('regPwd').value;
  let nick = document.getElementById('petName').value;

  if(!phone || !pwd || !nick){
    alert("请填写完整信息");
    return;
  }

  alert("注册成功！请登录");
  showPage('loginPage');
}

// 登录逻辑
function checkLogin(){
  let phone = document.getElementById('loginPhone').value;
  let pwd = document.getElementById('loginPwd').value;

  if(!phone || !pwd){
    alert("请填写账号密码");
    return;
  }

  document.getElementById('userNickname').innerText = nick;
  showPage('homePage');
}

// 提交订单
function submitOrder(){
  let type = document.getElementById('petType').value;
  let pick = document.getElementById('pickAddr').value;
  let time = document.getElementById('transportTime').value;
  let end = document.getElementById('endAddr').value;

  if(!pick || !time || !end){
    alert("请填写完整预约信息");
    return;
  }

  // 写入监控页
  document.getElementById('monInfo').innerText =
    `类型：${type}\n接宠：${pick}\n终点：${end}\n时间：${time}`;

  document.getElementById('monTrans').innerText = "运输中 🚚";

  alert("预约成功！等待司机接单");
  showPage('monitorPage');
}
</script>

</body>
</html>
